<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:300px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h2{
            margin-bottom:20px;
        }

        .input-box{
            margin-bottom:15px;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:5px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2f80ed;
        }

        .note{
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <form action="/login" method="post">
        <li th:if="${!#strings.isEmpty(errorMessge)}" th:text="${errorMessge}" > </li>

        <div class="input-box">
            <input type="text" placeholder="Tên đăng nhập" name="userid" id="userid" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Mật khẩu" name="secretPwd" id="secretPwd" required>
        </div>

        <button type="submit">Đăng nhập</button>
    </form>

    <div class="note">
        Chưa có tài khoản? <a href="#">Đăng ký</a>
    </div>
</div>

</body>
</html>
